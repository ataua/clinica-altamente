services:  
  db:
    image: postgres:17.9-alpine
    container_name: clinica-altamente-db
    restart: on-failure
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db_test:
    image: postgres:17.9-alpine
    container_name: clinica-altamente-db-test
    restart: on-failure
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      POSTGRES_DB: "${POSTGRES_DB:-clinica-altamente}_test"
    ports:
      - '5433:5432'
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  postgres_test_data:
